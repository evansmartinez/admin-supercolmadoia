<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPIURI OS - Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6; color: #60a5fa; }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body class="flex">

    <aside class="w-64 h-screen glass sticky top-0 flex flex-col p-6 z-50">
        <div class="mb-10 flex items-center gap-3">
            <img src="logoyofinalcorto.png" alt="Logo" class="w-10 h-10">
            <div>
                <h1 class="text-xl font-bold tracking-tighter text-blue-400">COMPIURI</h1>
                <p class="text-[8px] uppercase text-slate-500 tracking-widest text-center">Admin OS</p>
            </div>
        </div>
        <nav class="space-y-2 flex-grow">
            <button onclick="switchModule('inventario')" id="btn-inventario" class="sidebar-item active w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-[10px] font-bold tracking-widest text-left">
                <span>📦</span> Inventario
            </button>
            <button onclick="switchModule('cierre')" id="btn-cierre" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-[10px] font-bold tracking-widest text-left">
                <span>📅</span> Cierre del Día
            </button>
        </nav>
        <div class="mt-auto pt-6 border-t border-white/10 text-[10px] text-slate-500 italic text-center">Evans Martínez</div>
    </aside>

    <main class="flex-grow p-8">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h2 id="module-title" class="text-4xl font-bold tracking-tighter italic text-blue-100 uppercase">Inventario</h2>
                <p id="module-status" class="text-slate-400 text-xs mt-1">Esperando conexión...</p>
            </div>
            <input type="text" id="main-search" oninput="filterData()" placeholder="Buscar producto..." class="w-full md:w-80 bg-slate-900/50 border border-white/10 p-3 rounded-xl text-sm glass focus:outline-none focus:border-blue-500">
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-4 space-y-4">
                <div class="glass p-6 h-32 flex flex-col justify-center border-l-4 border-blue-500 shadow-xl text-center">
                    <p id="kpi-label-1" class="text-[10px] uppercase text-slate-500 font-bold mb-1 tracking-widest">Productos</p>
                    <p id="kpi-val-1" class="text-3xl font-bold">--</p>
                </div>
                <div class="glass p-6 h-32 flex flex-col justify-center border-l-4 border-red-500 shadow-xl text-center">
                    <p id="kpi-label-2" class="text-[10px] uppercase text-slate-500 font-bold mb-1 tracking-widest">Alerta Stock</p>
                    <p id="kpi-val-2" class="text-3xl font-bold">--</p>
                </div>
                <button onclick="refreshData()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold text-xs uppercase shadow-xl transition-all">Sincronizar Datos</button>
            </div>

            <div class="lg:col-span-8 glass p-6 h-[360px]">
                <p class="text-[10px] uppercase text-slate-500 font-bold mb-4 tracking-widest text-center">Distribución de Datos</p>
                <div class="chart-container"><canvas id="mainChart"></canvas></div>
            </div>
        </div>

        <section class="glass overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead id="table-head" class="bg-white/5 text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-white/10"></thead>
                    <tbody id="table-body" class="divide-y divide-white/5 text-sm uppercase"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const WEBHOOK_URL = "https://hook.us2.make.com/mi3g1y472l73g51refukafaej8uuspr4";
        let currentModule = 'inventario';
        let rawData = [];
        let myChart = null;

        async function refreshData() {
            document.getElementById('module-status').innerText = "Sincronizando con Make...";
            try {
                const response = await fetch(WEBHOOK_URL);
                const json = await response.json();
                
                // DIAGNÓSTICO PARA EVANS: Aplanar cualquier estructura de Make
                if (json.productos) rawData = json.productos;
                else if (json.data) rawData = json.data;
                else if (Array.isArray(json)) rawData = json;
                else rawData = [json]; // Por si viene un solo objeto

                console.log("Datos recibidos de Make:", rawData);
                filterData();
                document.getElementById('module-status').innerText = "Última actualización: " + new Date().toLocaleTimeString();
            } catch (error) {
                document.getElementById('module-status').innerText = "Error: No se pudo conectar.";
                console.error("Error Fetch:", error);
            }
        }

        function filterData() {
            const search = document.getElementById('main-search').value.toLowerCase();
            const filtered = rawData.filter(item => {
                const p = item.data || item.Record || item;
                const nombre = (p.NOMBRE_PRODUCTO || p.Producto || p.Name || "").toString().toLowerCase();
                return nombre.includes(search);
            });
            renderUI(filtered);
        }

        function renderUI(items) {
            const tableBody = document.getElementById('table-body');
            const tableHead = document.getElementById('table-head');
            tableBody.innerHTML = "";
            
            let labels = [], values = [], totalValue = 0, alerts = 0;

            if (currentModule === 'inventario') {
                tableHead.innerHTML = `<tr><th class="p-4">Producto</th><th class="p-4 text-center">Stock</th><th class="p-4 text-right">Precio</th></tr>`;
                items.forEach(i => {
                    const p = i.data || i.Record || i;
                    const stock = parseInt(p.Stock_Disponible || p.Stock || 0);
                    const precio = parseFloat(p.PRECIO || p.Precio || 0);
                    if (stock < 5) alerts++;
                    
                    labels.push((p.NOMBRE_PRODUCTO || p.Producto || "---").substring(0, 10));
                    values.push(stock);

                    tableBody.innerHTML += `
                        <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                            <td class="p-4 font-bold">${p.NOMBRE_PRODUCTO || p.Producto || 'S/N'}</td>
                            <td class="p-4 text-center">
                                <span class="px-2 py-1 rounded-full text-[10px] font-bold ${stock < 5 ? 'bg-red-500/20 text-red-500 border border-red-500' : 'bg-green-500/20 text-green-500 border border-green-500'}">
                                    ${stock} UDS
                                </span>
                            </td>
                            <td class="p-4 text-right font-mono text-blue-400">RD$ ${precio.toLocaleString()}</td>
                        </tr>`;
                });
                document.getElementById('kpi-val-1').innerText = items.length;
                document.getElementById('kpi-val-2').innerText = alerts;
                updateChart(labels, values, 'Stock', '#3b82f6');

            } else {
                // MÓDULO CIERRE
                tableHead.innerHTML = `<tr><th class="p-4">Producto</th><th class="p-4 text-center">Vendido</th><th class="p-4 text-right">Monto Total</th></tr>`;
                items.forEach(i => {
                    const p = i.data || i.Record || i;
                    const monto = parseFloat(p.MONTO_TOTAL || p.Total || p.PRECIO || 0);
                    const cant = parseInt(p.CANTIDAD || 1);
                    totalValue += monto;

                    labels.push((p.NOMBRE_PRODUCTO || p.Producto || "---").substring(0, 10));
                    values.push(monto);

                    tableBody.innerHTML += `
                        <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                            <td class="p-4 font-bold italic">${p.NOMBRE_PRODUCTO || p.Producto || 'Venta'}</td>
                            <td class="p-4 text-center text-slate-400">${cant}</td>
                            <td class="p-4 text-right font-mono text-green-400 font-bold">RD$ ${monto.toLocaleString()}</td>
                        </tr>`;
                });
                document.getElementById('kpi-val-1').innerText = "RD$ " + totalValue.toLocaleString();
                document.getElementById('kpi-val-2').innerText = items.length;
                updateChart(labels, values, 'Ingresos RD$', '#10b981');
            }
        }

        function updateChart(labels, data, label, color) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ label: label, data: data, backgroundColor: color + 'CC', borderRadius: 5 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 9 } } }
                    }
                }
            });
        }

        function switchModule(mod) {
            currentModule = mod;
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-' + mod).classList.add('active');
            document.getElementById('module-title').innerText = mod === 'inventario' ? 'Inventario' : 'Cierre del Día';
            document.getElementById('kpi-label-1').innerText = mod === 'inventario' ? 'Productos' : 'Ingresos Hoy';
            document.getElementById('kpi-label-2').innerText = mod === 'inventario' ? 'Alerta Stock' : 'Ventas Totales';
            renderUI(rawData);
        }

        window.onload = refreshData;
    </script>
</body>
</html>
