<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COMPIURI OS - Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { color: #60a5fa; border-top: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .chart-container { position: relative; height: 260px; width: 100%; }
        #login-screen, #modal-registro { position: fixed; inset: 0; z-index: 100; background: rgba(15, 23, 42, 0.9); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
        input { transition: all 0.2s; }
        input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="pb-20">

    <div id="login-screen">
        <div class="glass p-8 rounded-3xl w-full max-sm shadow-2xl text-center space-y-6">
            <h2 class="text-2xl font-bold text-blue-400 italic">COMPIURI OS</h2>
            <div class="space-y-4">
                <input type="text" id="user" placeholder="Usuario" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-sm">
                <input type="password" id="pass" placeholder="Contraseña" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-sm">
                <button onclick="handleLogin()" class="w-full py-4 bg-blue-600 rounded-xl font-bold uppercase text-xs">Entrar</button>
            </div>
        </div>
    </div>

    <div id="modal-registro" class="hidden">
        <div class="glass p-6 rounded-3xl w-full max-w-sm space-y-4 relative">
            <button onclick="toggleModal()" class="absolute top-4 right-4 text-slate-400">✕</button>
            <h3 class="text-xl font-bold text-blue-400">Nuevo / Actualizar</h3>
            <div class="space-y-3">
                <input type="text" id="reg-nombre" placeholder="Nombre del Producto" class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl text-sm">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="reg-precio" placeholder="Precio RD$" class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl text-sm">
                    <input type="number" id="reg-stock" placeholder="Stock" class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl text-sm">
                </div>
                <input type="text" id="reg-cat" placeholder="Categoría (Ej: Bebidas)" class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl text-sm">
                <button onclick="enviarAMake()" id="btn-enviar" class="w-full py-4 bg-green-600 rounded-xl font-bold uppercase text-xs shadow-lg">Guardar en Inventario</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="p-6 glass sticky top-0 z-50 flex justify-between items-center">
            <div>
                <h1 id="module-title" class="text-2xl font-bold tracking-tighter text-blue-400 italic">INVENTARIO</h1>
                <p id="module-desc" class="text-[9px] text-slate-400 uppercase tracking-widest">Control de Activos</p>
            </div>
            <button onclick="toggleModal()" class="bg-blue-600 w-12 h-12 rounded-full shadow-lg flex items-center justify-center text-2xl">+</button>
        </header>

        <main class="p-4 space-y-6">
            <input type="text" id="main-search" oninput="filterData()" placeholder="Buscar..." class="w-full bg-slate-900/80 border border-white/10 p-4 rounded-2xl text-sm glass">

            <div class="grid grid-cols-2 gap-4" id="kpi-container">
                <div class="glass p-4 rounded-2xl border-l-4 border-blue-500">
                    <p id="kpi-label-1" class="text-[9px] text-slate-500 font-bold mb-1 uppercase">Total</p>
                    <p id="kpi-val-1" class="text-xl font-bold">--</p>
                </div>
                <div class="glass p-4 rounded-2xl border-l-4 border-red-500">
                    <p id="kpi-label-2" class="text-[9px] text-slate-500 font-bold mb-1 uppercase">Alerta</p>
                    <p id="kpi-val-2" class="text-xl font-bold">--</p>
                </div>
            </div>

            <div class="glass p-4 rounded-2xl h-[320px]"><canvas id="mainChart"></canvas></div>

            <div id="mobile-list" class="space-y-3"></div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 h-16 glass border-t border-white/10 flex justify-around items-center z-50">
            <button onclick="switchModule('inventario')" id="btn-inventario" class="flex flex-col items-center justify-center w-full h-full tab-active">
                <span class="text-xl">📦</span><span class="text-[9px] font-bold uppercase mt-1">Stock</span>
            </button>
            <button onclick="switchModule('cierre')" id="btn-cierre" class="flex flex-col items-center justify-center w-full h-full text-slate-500">
                <span class="text-xl">📅</span><span class="text-[9px] font-bold uppercase mt-1">Cierre</span>
            </button>
        </nav>
    </div>

    <script>
        const AUTH = { user: "evans", pass: "1234" };
        const ENDPOINTS = {
            inventario: "https://hook.us2.make.com/mi3g1y472l73g51refukafaej8uuspr4",
            cierre: "https://hook.us2.make.com/d5tivtytjjtyrxw1hhcp4vr5ijerc6b5",
            guardar: "TU_NUEVO_WEBHOOK_PARA_GUARDAR_AQUI" // <--- PEGA TU NUEVO WEBHOOK AQUÍ
        };

        let currentModule = 'inventario', rawData = [], myChart = null;
        const palette = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];

        function handleLogin() {
            if (document.getElementById('user').value === AUTH.user && document.getElementById('pass').value === AUTH.pass) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                refreshData();
            }
        }

        function toggleModal() {
            document.getElementById('modal-registro').classList.toggle('hidden');
        }

        async function enviarAMake() {
            const btn = document.getElementById('btn-enviar');
            const data = {
                nombre: document.getElementById('reg-nombre').value,
                precio: document.getElementById('reg-precio').value,
                stock: document.getElementById('reg-stock').value,
                categoria: document.getElementById('reg-cat').value
            };

            if(!data.nombre || !data.precio) return alert("Nombre y Precio son obligatorios");

            btn.innerText = "GUARDANDO...";
            btn.disabled = true;

            try {
                await fetch(ENDPOINTS.guardar, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                alert("¡Producto actualizado, Evans!");
                toggleModal();
                refreshData();
            } catch (e) { alert("Error al guardar"); }
            btn.innerText = "GUARDAR EN INVENTARIO";
            btn.disabled = false;
        }

        async function refreshData() {
            try {
                const response = await fetch(ENDPOINTS[currentModule]);
                const json = await response.json();
                let list = json.productos || json.ventas || json.data || json;
                if (list.data) list = list.data;
                rawData = Array.isArray(list) ? list : [list];
                renderUI(rawData);
            } catch (e) { console.log("Error Fetch"); }
        }

        function renderUI(items) {
            const list = document.getElementById('mobile-list');
            list.innerHTML = "";
            let labels = [], values = [], totalVal = 0, alerts = 0;

            if (currentModule === 'inventario') {
                document.getElementById('kpi-label-1').innerText = "Productos";
                document.getElementById('kpi-label-2').innerText = "Stock Bajo";
                items.forEach(i => {
                    const p = i.data || i.Record || i;
                    const stock = parseInt(p.Stock_Disponible || 0);
                    if (stock < 5) alerts++;
                    list.innerHTML += `<div class="glass p-4 rounded-2xl flex justify-between items-center"><div><p class="font-bold text-sm uppercase">${p.NOMBRE_PRODUCTO}</p><p class="text-blue-400 text-xs font-mono">RD$ ${p.PRECIO}</p></div><span class="px-3 py-1 rounded-full text-[10px] font-bold border ${stock < 5 ? 'border-red-500 text-red-500' : 'border-green-500 text-green-500'}">${stock} UDS</span></div>`;
                });
                document.getElementById('kpi-val-1').innerText = items.length;
                document.getElementById('kpi-val-2').innerText = alerts;
                updateChart(items.slice(0,6).map(x => (x.data?.NOMBRE_PRODUCTO || 'Item').substring(0,6)), items.slice(0,6).map(x => x.data?.Stock_Disponible || 0), 'bar');
            } else {
                document.getElementById('kpi-label-1').innerText = "Venta Hoy";
                document.getElementById('kpi-label-2').innerText = "Órdenes";
                let agrupar = {};
                items.forEach(i => {
                    const p = i.data || i.Record || i;
                    const monto = parseFloat(p.Monto_Total || 0);
                    totalVal += monto;
                    agrupar[p.Nombre_Producto] = (agrupar[p.Nombre_Producto] || 0) + monto;
                    list.innerHTML += `<div class="glass p-4 rounded-2xl flex justify-between items-center"><div><p class="font-bold text-sm italic">${p.Nombre_Producto}</p><p class="text-slate-500 text-[10px] uppercase">${p.Cantidad} UDS</p></div><p class="text-green-400 font-bold font-mono">RD$ ${monto}</p></div>`;
                });
                document.getElementById('kpi-val-1').innerText = "RD$ " + Math.round(totalVal);
                document.getElementById('kpi-val-2').innerText = items.length;
                updateChart(Object.keys(agrupar).slice(0,5), Object.values(agrupar).slice(0,5), 'pie');
            }
        }

        function updateChart(labels, data, type) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: type,
                data: { labels: labels, datasets: [{ data: data, backgroundColor: palette.map(c => c + 'CC'), borderColor: '#0f172a', borderWidth: 2 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: type === 'pie', position: 'bottom', labels: { color: '#94a3b8', font: {size: 8} } } } }
            });
        }

        function switchModule(mod) {
            currentModule = mod;
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('tab-active', 'text-slate-500'));
            document.getElementById('btn-' + mod).classList.add('tab-active');
            document.getElementById('module-title').innerText = mod.toUpperCase();
            refreshData();
        }
    </script>
</body>
</html>
