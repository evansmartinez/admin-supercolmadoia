<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPIURI OS - Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        .sidebar-item { transition: all 0.3s ease; border-left: 4px solid transparent; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.1); border-left-color: #3b82f6; color: #60a5fa; }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body class="flex">

    <aside class="w-64 h-screen glass sticky top-0 flex flex-col p-6 z-50">
        <div class="mb-10 flex items-center gap-3">
            <img src="logoyofinalcorto.png" alt="Logo" class="w-10 h-10">
            <div>
                <h1 class="text-xl font-bold tracking-tighter text-blue-400">COMPIURI</h1>
                <p class="text-[10px] uppercase text-slate-500 tracking-widest text-center">Admin OS</p>
            </div>
        </div>
        <nav class="space-y-2 flex-grow">
            <button onclick="switchModule('inventario')" id="btn-inventario" class="sidebar-item active w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-xs font-bold tracking-widest text-left">
                <span>📦</span> Inventario
            </button>
            <button onclick="switchModule('ventas')" id="btn-ventas" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-xs font-bold tracking-widest text-left">
                <span>💰</span> Ventas
            </button>
        </nav>
        <div class="mt-auto pt-6 border-t border-white/10 text-[10px] text-slate-500 italic text-center">
            Evans Martínez
        </div>
    </aside>

    <main class="flex-grow p-8 max-w-[calc(100vw-256px)]">
        
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h2 id="module-title" class="text-4xl font-bold tracking-tighter italic text-blue-100">Inventario</h2>
                <div class="flex items-center gap-2 mt-1">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-green-500"></span>
                    <p id="module-desc" class="text-slate-400 text-sm">Monitoreo de activos.</p>
                </div>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="main-search" oninput="filterData()" placeholder="Buscar producto..." 
                    class="w-full bg-slate-900/50 border border-white/10 p-3 rounded-xl text-sm glass focus:outline-none focus:border-blue-500 shadow-xl">
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8 items-start">
            <div class="lg:col-span-4 space-y-4">
                <div class="glass p-6 h-32 flex flex-col justify-center border-l-4 border-blue-500 shadow-lg">
                    <p id="kpi-label-1" class="text-[10px] uppercase text-slate-500 font-bold mb-1 tracking-widest text-center">Total Productos</p>
                    <p id="kpi-val-1" class="text-3xl font-bold text-center">0</p>
                </div>
                <div id="kpi-box-2" class="glass p-6 h-32 flex flex-col justify-center border-l-4 border-red-500 shadow-lg">
                    <p id="kpi-label-2" class="text-[10px] uppercase text-slate-500 font-bold mb-1 tracking-widest text-center">Stock Crítico</p>
                    <p id="kpi-val-2" class="text-3xl font-bold text-center text-red-500">0</p>
                </div>
                <button onclick="refreshCurrentModule()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-xl transition-all active:scale-95">🔄 Sincronizar Ahora</button>
            </div>

            <div class="lg:col-span-8 glass p-6 h-[344px] overflow-hidden">
                <p class="text-[10px] uppercase text-slate-500 font-bold mb-4 tracking-widest" id="chart-title">Análisis Visual Detallado</p>
                <div class="chart-container">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>

        <section class="glass overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead id="table-head" class="bg-white/5 text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-white/10"></thead>
                    <tbody id="table-body" class="divide-y divide-white/5 text-sm">
                        <tr><td colspan="4" class="p-20 text-center animate-pulse text-slate-500">CONECTANDO CON DATA STORE...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const ENDPOINTS = {
            inventario: "https://hook.us2.make.com/mi3g1y472l73g51refukafaej8uuspr4",
            ventas: "TU_WEBHOOK_VENTAS_AQUI" 
        };

        let currentModule = 'inventario';
        let allData = [];
        let myChart = null;

        // Generador de colores aleatorios para las barras
        function generateColors(count) {
            const palette = [
                'rgba(59, 130, 246, 0.7)', 'rgba(16, 185, 129, 0.7)', 'rgba(245, 158, 11, 0.7)', 
                'rgba(239, 68, 68, 0.7)', 'rgba(139, 92, 246, 0.7)', 'rgba(236, 72, 153, 0.7)',
                'rgba(6, 182, 212, 0.7)', 'rgba(249, 115, 22, 0.7)', 'rgba(132, 204, 22, 0.7)'
            ];
            let colors = [];
            for (let i = 0; i < count; i++) {
                colors.push(palette[i % palette.length]);
            }
            return colors;
        }

        function initChart(labels, data, label, colors) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        backgroundColor: colors,
                        borderColor: colors.map(c => c.replace('0.7', '1')),
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleFont: { size: 14 },
                            callbacks: {
                                label: (context) => ` Valor: ${Math.abs(context.parsed.y).toLocaleString()}`
                            }
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { color: 'rgba(255,255,255,0.05)' }, 
                            ticks: { color: '#94a3b8', font: { size: 10 } } 
                        },
                        x: { 
                            grid: { display: false }, 
                            ticks: { color: '#94a3b8', font: { size: 9 }, maxRotation: 45, minRotation: 45 } 
                        }
                    }
                }
            });
        }

        async function switchModule(mod) {
            currentModule = mod;
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`btn-${mod}`).classList.add('active');
            refreshCurrentModule();
        }

        async function refreshCurrentModule() {
            try {
                const response = await fetch(ENDPOINTS[currentModule]);
                const data = await response.json();
                allData = data.productos || (data.productos && data.productos.data) || (Array.isArray(data) ? data : (data.data || []));
                filterData();
            } catch (err) { console.error("Error Sync"); }
        }

        function filterData() {
            const searchTerm = document.getElementById('main-search').value.toLowerCase();
            const filtered = allData.filter(item => {
                const p = item.data || item.Record || item;
                const target = (currentModule === 'inventario') 
                    ? (p.NOMBRE_PRODUCTO || "") + (p.CATEGORIA || "")
                    : (p.Cliente || "") + (p.Detalle || "");
                return target.toLowerCase().includes(searchTerm);
            });
            renderDashboard(filtered);
        }

        function renderDashboard(items) {
            const tableBody = document.getElementById('table-body');
            const tableHead = document.getElementById('table-head');
            tableBody.innerHTML = "";
            let labels = [], chartData = [];

            if (currentModule === 'inventario') {
                tableHead.innerHTML = `<tr><th class="p-4">Producto</th><th class="p-4 text-center">Categoría</th><th class="p-4 text-center">Precio</th><th class="p-4 text-center">Stock</th></tr>`;
                
                // Filtramos y ordenamos para el gráfico
                const validItems = items.filter(i => (i.data?.NOMBRE_PRODUCTO || i.NOMBRE_PRODUCTO));
                const sorted = [...validItems].sort((a,b) => Math.abs(a.data?.Stock_Disponible || a.Stock_Disponible || 0) - Math.abs(b.data?.Stock_Disponible || b.Stock_Disponible || 0)).slice(0, 10);
                
                sorted.forEach(i => {
                    const p = i.data || i.Record || i;
                    labels.push((p.NOMBRE_PRODUCTO || "").substring(0, 12));
                    // Usamos Math.abs por si el stock del Arroz viene negativo en tu DB
                    chartData.push(Math.abs(parseInt(p.Stock_Disponible || 0)));
                });

                let stockBajo = 0;
                items.forEach(item => {
                    const p = item.data || item.Record || item;
                    const stock = parseInt(p.Stock_Disponible || 0);
                    if (stock < 5) stockBajo++;
                    tableBody.innerHTML += `
                        <tr class="hover:bg-white/5 transition-colors">
                            <td class="p-4 font-bold uppercase text-slate-100">${p.NOMBRE_PRODUCTO}</td>
                            <td class="p-4 text-center text-[10px] text-slate-500 font-bold uppercase">${p.CATEGORIA || 'Gral'}</td>
                            <td class="p-4 text-center font-mono text-blue-400">RD$ ${parseFloat(p.PRECIO || 0).toLocaleString()}</td>
                            <td class="p-4 text-center"><span class="px-3 py-1 rounded-full text-[10px] font-bold border ${stock < 5 ? 'border-red-500 text-red-500 bg-red-500/10' : 'border-green-500 text-green-500 bg-green-500/10'}">${stock} UDS</span></td>
                        </tr>`;
                });
                document.getElementById('kpi-val-1').innerText = items.length;
                document.getElementById('kpi-val-2').innerText = stockBajo;
                initChart(labels, chartData, 'Existencias', generateColors(labels.length));
            } else {
                // Módulo de Ventas
                tableHead.innerHTML = `<tr><th class="p-4">Cliente</th><th class="p-4 text-center">Detalle</th><th class="p-4 text-right">Monto</th></tr>`;
                let total = 0;
                const resume = {};
                items.forEach(item => {
                    const v = item.data || item.Record || item;
                    const monto = parseFloat(v.Monto || v.Total || 0);
                    total += monto;
                    const name = v.Cliente || "Final";
                    resume[name] = (resume[name] || 0) + monto;
                    tableBody.innerHTML += `<tr class="hover:bg-white/5"><td class="p-4 font-bold uppercase">${name}</td><td class="p-4 text-center text-xs text-slate-500 italic">${v.Detalle || '---'}</td><td class="p-4 text-right font-mono font-bold text-green-400">RD$ ${monto.toLocaleString()}</td></tr>`;
                });
                labels = Object.keys(resume);
                chartData = Object.values(resume);
                initChart(labels, chartData, 'Ventas RD$', generateColors(labels.length));
                document.getElementById('kpi-val-1').innerText = "RD$ " + total.toLocaleString();
                document.getElementById('kpi-val-2').innerText = items.length;
            }
        }
        window.onload = () => refreshCurrentModule();
    </script>
</body>
</html>
