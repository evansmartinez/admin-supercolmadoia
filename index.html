<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Colmado La Grada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: white;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <nav class="lg:col-span-3 glass p-6 flex flex-col gap-4 h-fit">
            <div class="mb-8 text-center">
                <h1 class="text-2xl font-bold tracking-wider text-blue-400">LA GRADA</h1>
                <p class="text-xs text-slate-400 uppercase tracking-widest">Admin Panel</p>
            </div>
            <a href="#" class="glass-card p-3 rounded-lg flex items-center gap-3 text-blue-300">📦 Inventario</a>
            <a href="#" class="p-3 rounded-lg flex items-center gap-3 text-slate-300 hover:text-white transition">💰 Ventas</a>
            <a href="#" class="p-3 rounded-lg flex items-center gap-3 text-slate-300 hover:text-white transition">👥 Clientes</a>
            <div class="mt-auto pt-6 border-t border-white/10 text-xs text-slate-500">Sesión: Evans</div>
        </nav>

        <main class="lg:col-span-9 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass p-5">
                    <p class="text-slate-400 text-sm">Estado de Conexión</p>
                    <h3 id="connection-status" class="text-lg font-bold text-yellow-500">Conectando...</h3>
                </div>
            </div>

            <section class="glass p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold text-center w-full md:w-auto">Control de Inventario Real</h2>
                    <button class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm transition">
                        + Nuevo Producto
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-white/10 text-slate-400 text-sm">
                                <th class="pb-3 font-medium text-center uppercase">Producto</th>
                                <th class="pb-3 font-medium text-center uppercase">Categoría</th>
                                <th class="pb-3 font-medium text-center uppercase">Precio</th>
                                <th class="pb-3 font-medium text-center uppercase">Stock</th>
                                <th class="pb-3 font-medium text-center uppercase">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-body" class="text-sm">
                            <tr>
                                <td colspan="5" class="py-10 text-center text-slate-500 italic">Cargando datos desde Make.com...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Tu URL de Webhook de Make
        const MAKE_URL = "https://hook.us2.make.com/mi3g1y472l73g51refukafaej8uuspr4";

        async function cargarDatos() {
            const statusEl = document.getElementById('connection-status');
            const tableBody = document.getElementById('inventory-body');

            try {
                const response = await fetch(MAKE_URL);
                const data = await response.json();

                console.log("Datos recibidos:", data);

                if (data.status === "success" || data.productos) {
                    statusEl.innerText = "Conectado";
                    statusEl.classList.replace('text-yellow-500', 'text-green-400');
                    
                    // Limpiar tabla
                    tableBody.innerHTML = '';

                    // Mapear productos
                    data.productos.forEach(prod => {
                        const stockColor = prod.stock < 10 ? 'text-red-400 bg-red-500/10' : 'text-green-400 bg-green-500/10';
                        
                        tableBody.innerHTML += `
                            <tr class="border-b border-white/5 hover:bg-white/5 transition">
                                <td class="py-4 font-semibold text-center uppercase">${prod.item}</td>
                                <td class="py-4 text-slate-400 text-center">${prod.categoria || 'General'}</td>
                                <td class="py-4 text-center">RD$ ${prod.precio}</td>
                                <td class="py-4 text-center">
                                    <span class="${stockColor} px-2 py-1 rounded text-xs font-bold">${prod.stock}</span>
                                </td>
                                <td class="py-4 text-center">
                                    <button class="text-blue-400 hover:underline">Editar</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (error) {
                console.error("Error:", error);
                statusEl.innerText = "Error de enlace";
                statusEl.classList.replace('text-yellow-500', 'text-red-500');
                tableBody.innerHTML = `<tr><td colspan="5" class="py-10 text-center text-red-400">No se pudo conectar con el Webhook. Revisa Make.com</td></tr>`;
            }
        }

        // Iniciar carga al abrir
        window.onload = cargarDatos;
    </script>
</body>
</html>
