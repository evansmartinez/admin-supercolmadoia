<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPIURI Pro - Colmado La Grada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        .pulse-live { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-4 glass p-6">
            <div class="flex items-center gap-4">
                <img src="logoyofinalcorto.png" alt="Logo" class="w-16 h-16 object-contain">
                <div>
                    <h1 class="text-3xl font-bold tracking-tighter text-blue-400">COMPIURI</h1>
                    <p class="text-xs uppercase tracking-widest text-slate-400">Panel de Control Profesional</p>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="text-right">
                    <p class="text-[10px] uppercase text-slate-500">Estado de Conexión</p>
                    <div class="flex items-center justify-end gap-2">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></span>
                        <span id="status-text" class="font-bold text-sm uppercase">Desconectado</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
            <div class="glass p-4">
                <p class="text-xs text-slate-400 uppercase">Productos en Stock</p>
                <p id="kpi-total" class="text-3xl font-bold">0</p>
            </div>
            <div class="glass p-4 border-b-2 border-blue-500">
                <p class="text-xs text-slate-400 uppercase">Última Sincronización</p>
                <p id="kpi-time" class="text-xl font-mono">--:--:--</p>
            </div>
            <div class="glass p-4">
                <button onclick="fetchData()" class="w-full h-full bg-blue-600 hover:bg-blue-500 transition-colors rounded-lg font-bold text-sm">REFRESCAR AHORA</button>
            </div>
        </div>

        <section class="glass overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800/50 text-slate-400 text-[10px] uppercase tracking-wider">
                        <tr>
                            <th class="p-4">Producto</th>
                            <th class="p-4 text-center">Categoría</th>
                            <th class="p-4 text-center">Precio</th>
                            <th class="p-4 text-center">Stock</th>
                        </tr>
                    </thead>
                    <tbody id="data-table" class="divide-y divide-white/5">
                        <tr>
                            <td colspan="4" class="p-10 text-center text-slate-500 italic">Iniciando protocolo de conexión...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const WEBHOOK_URL = "https://hook.us2.make.com/mi3g1y472l73g51refukafaej8uuspr4";

        // Función de extracción profunda para navegar el desorden de Make
        function extractList(obj) {
            if (Array.isArray(obj)) return obj;
            if (obj && typeof obj === 'object') {
                if (obj.productos && Array.isArray(obj.productos)) return obj.productos;
                if (obj.data && Array.isArray(obj.data)) return obj.data;
                // Si es un objeto único, lo envolvemos en array para que no rompa la tabla
                return [obj]; 
            }
            return [];
        }

        async function fetchData() {
            const table = document.getElementById('data-table');
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');

            try {
                const response = await fetch(WEBHOOK_URL);
                if (!response.ok) throw new Error("Server Error");
                
                const json = await response.json();
                const items = extractList(json);

                // Update UI Status
                statusText.innerText = "En Línea";
                statusText.className = "font-bold text-sm uppercase text-green-400";
                statusDot.className = "w-2 h-2 rounded-full bg-green-500 pulse-live";
                document.getElementById('kpi-total').innerText = items.length;
                document.getElementById('kpi-time').innerText = new Date().toLocaleTimeString();

                if (items.length === 0 || !items[0]) {
                    table.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-yellow-500">Conectado, pero el Data Store parece estar vacío.</td></tr>`;
                    return;
                }

                table.innerHTML = "";
                items.forEach(rawItem => {
                    // Limpieza de datos anidados
                    const p = rawItem.data || rawItem.Record || rawItem;
                    const nombre = p.NOMBRE_PRODUCTO || "Producto Desconocido";
                    const precio = p.PRECIO || "0.00";
                    const stock = p.Stock_Disponible || "0";
                    const cat = p.CATEGORIA || "General";

                    const stockAlert = parseInt(stock) < 5 ? 'text-red-500 font-bold' : 'text-green-400';

                    table.innerHTML += `
                        <tr class="hover:bg-white/5 transition-colors">
                            <td class="p-4 font-semibold text-blue-100 uppercase text-sm">${nombre}</td>
                            <td class="p-4 text-center text-xs text-slate-400 uppercase">${cat}</td>
                            <td class="p-4 text-center font-mono text-blue-300">RD$ ${parseFloat(precio).toLocaleString()}</td>
                            <td class="p-4 text-center">
                                <span class="px-3 py-1 rounded-full bg-slate-900 border border-white/10 text-xs ${stockAlert}">
                                    ${stock} UDS
                                </span>
                            </td>
                        </tr>
                    `;
                });

            } catch (err) {
                statusText.innerText = "Offline";
                statusText.className = "font-bold text-sm uppercase text-red-500";
                statusDot.className = "w-2 h-2 rounded-full bg-red-500";
                table.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-red-400 font-bold">Error de Sincronización. Verifique que el escenario de Make esté ACTIVO.</td></tr>`;
            }
        }

        // Ejecución automática
        fetchData();
        setInterval(fetchData, 45000); // Sincroniza cada 45 segundos
    </script>
</body>
</html>
