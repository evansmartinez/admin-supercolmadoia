<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPIURI OS - Daily Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        .sidebar-item { transition: all 0.3s ease; border-left: 4px solid transparent; text-align: left; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.1); border-left-color: #3b82f6; color: #60a5fa; }
        .chart-container { position: relative; height: 320px; width: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex">

    <aside class="w-64 h-screen glass sticky top-0 flex flex-col p-6 z-50">
        <div class="mb-10 flex items-center gap-3">
            <img src="logoyofinalcorto.png" alt="Logo" class="w-10 h-10">
            <div>
                <h1 class="text-xl font-bold tracking-tighter text-blue-400">COMPIURI</h1>
                <p class="text-[10px] uppercase text-slate-500 tracking-widest text-center">Admin OS</p>
            </div>
        </div>
        <nav class="space-y-2 flex-grow">
            <button onclick="switchModule('inventario')" id="btn-inventario" class="sidebar-item active w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-xs font-bold tracking-widest">
                <span>📦</span> Inventario
            </button>
            <button onclick="switchModule('cierre')" id="btn-cierre" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-xs font-bold tracking-widest">
                <span>📅</span> Cierre del Día
            </button>
            <button onclick="switchModule('precios')" id="btn-precios" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-xs font-bold tracking-widest">
                <span>📈</span> Precios
            </button>
        </nav>
        <div class="mt-auto pt-6 border-t border-white/10 text-[10px] text-slate-500 italic text-center">Evans Martínez</div>
    </aside>

    <main class="flex-grow p-8 max-w-[calc(100vw-256px)]">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h2 id="module-title" class="text-4xl font-bold tracking-tighter italic text-blue-100 uppercase">Cierre del Día</h2>
                <div class="flex items-center gap-2 mt-1">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-blue-500"></span>
                    <p id="module-desc" class="text-slate-400 text-sm">Resumen de ingresos hoy.</p>
                </div>
            </div>
            <div class="glass px-4 py-2 text-blue-400 font-bold text-sm" id="current-date-display"></div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-4 space-y-4">
                <div class="glass p-6 h-32 flex flex-col justify-center border-l-4 border-green-500 shadow-xl">
                    <p class="text-[10px] uppercase text-slate-500 font-bold mb-1 tracking-widest text-xs">Ventas Totales (Hoy)</p>
                    <p id="kpi-hoy-dinero" class="text-3xl font-bold text-green-400">RD$ 0</p>
                </div>
                <div class="glass p-6 h-32 flex flex-col justify-center border-l-4 border-blue-500 shadow-xl">
                    <p class="text-[10px] uppercase text-slate-500 font-bold mb-1 tracking-widest text-xs">Órdenes Completadas</p>
                    <p id="kpi-hoy-ordenes" class="text-3xl font-bold">0</p>
                </div>
                <button onclick="refreshCurrentModule()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold text-xs uppercase shadow-xl transition-all active:scale-95">🔄 Actualizar Cierre</button>
            </div>

            <div class="lg:col-span-8 glass p-6 h-[360px] overflow-hidden">
                <p class="text-[10px] uppercase text-slate-500 font-bold mb-4 tracking-widest">Top Productos por Ingresos hoy</p>
                <div class="chart-container"><canvas id="mainChart"></canvas></div>
            </div>
        </div>

        <section class="glass overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead id="table-head" class="bg-white/5 text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-white/10"></thead>
                    <tbody id="table-body" class="divide-y divide-white/5 text-sm"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const ENDPOINTS = {
            inventario: "https://hook.us2.make.com/mi3g1y472l73g51refukafaej8uuspr4",
            cierre: "TU_WEBHOOK_DE_VENTAS_DIARIAS_AQUI", // Cambia esto por el webhook que trae las ventas
            precios: "https://hook.us2.make.com/mi3g1y472l73g51refukafaej8uuspr4"
        };

        let currentModule = 'cierre';
        let allData = [];
        let myChart = null;

        function initChart(labels, data, colors) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors.map(c => c + 'CC'),
                        borderColor: colors,
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    indexAxis: 'y', // Gráfico horizontal para leer mejor nombres largos
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        y: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } }
                    }
                }
            });
        }

        async function refreshCurrentModule() {
            document.getElementById('current-date-display').innerText = new Date().toLocaleDateString('es-DO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            try {
                const response = await fetch(ENDPOINTS[currentModule]);
                const data = await response.json();
                allData = data.productos || data.ventas || data;
                renderUI();
            } catch (e) { console.error("Error en el cierre"); }
        }

        function renderUI() {
            const tableBody = document.getElementById('table-body');
            const tableHead = document.getElementById('table-head');
            tableBody.innerHTML = "";
            
            if (currentModule === 'cierre') {
                tableHead.innerHTML = `<tr><th class="p-4 uppercase">Producto</th><th class="p-4 text-center">Cant.</th><th class="p-4 text-right">Total Ventas</th></tr>`;
                
                let ingresosTotales = 0;
                let resumenProductos = {}; // Para agrupar ventas del mismo producto

                allData.forEach(item => {
                    const v = item.data || item;
                    const nombre = v.NOMBRE_PRODUCTO || v.Producto || "Varios";
                    const monto = parseFloat(v.MONTO_TOTAL || v.Total || 0);
                    const cant = parseInt(v.CANTIDAD || 1);

                    ingresosTotales += monto;
                    if (!resumenProductos[nombre]) {
                        resumenProductos[nombre] = { monto: 0, cant: 0 };
                    }
                    resumenProductos[nombre].monto += monto;
                    resumenProductos[nombre].cant += cant;
                });

                // Ordenar para la gráfica
                const sortedKeys = Object.keys(resumenProductos).sort((a,b) => resumenProductos[b].monto - resumenProductos[a].monto).slice(0, 8);
                const labels = sortedKeys;
                const chartData = sortedKeys.map(k => resumenProductos[k].monto);
                const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];

                sortedKeys.forEach(nombre => {
                    const data = resumenProductos[nombre];
                    tableBody.innerHTML += `
                        <tr class="hover:bg-white/5 border-b border-white/5">
                            <td class="p-4 font-bold uppercase">${nombre}</td>
                            <td class="p-4 text-center text-slate-400">${data.cant} unds</td>
                            <td class="p-4 text-right font-mono text-green-400 font-bold">RD$ ${data.monto.toLocaleString()}</td>
                        </tr>`;
                });

                document.getElementById('kpi-hoy-dinero').innerText = "RD$ " + ingresosTotales.toLocaleString();
                document.getElementById('kpi-hoy-ordenes').innerText = allData.length;
                initChart(labels, chartData, colors);
            }
        }

        function switchModule(mod) {
            currentModule = mod;
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`btn-${mod}`).classList.add('active');
            refreshCurrentModule();
        }

        window.onload = () => switchModule('cierre');
    </script>
</body>
</html>
