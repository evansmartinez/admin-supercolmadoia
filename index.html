<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compiuri Dash - Colmado La Grada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: white;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .pulse-green {
            box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <nav class="lg:col-span-3 glass p-6 flex flex-col gap-4 h-fit sticky top-8 text-center">
            <div class="mb-8">
                <div class="inline-block p-2 bg-white/10 rounded-xl mb-4 shadow-xl">
                    <img src="logoyofinalcorto.png" alt="Logo Compiuri" class="w-20 h-auto mx-auto">
                </div>
                <h1 class="text-3xl font-bold tracking-wider text-blue-400">COMPIURI</h1>
                <p class="text-xs text-slate-400 uppercase tracking-widest mt-1 italic">Powered by Evans</p>
            </div>
            <a href="#" class="glass-card p-3 rounded-lg flex items-center gap-3 text-blue-300">📦 Inventario</a>
            <a href="#" class="p-3 rounded-lg flex items-center gap-3 text-slate-300 hover:text-white transition">💰 Ventas</a>
            <a href="#" class="p-3 rounded-lg flex items-center gap-3 text-slate-300 hover:text-white transition">👥 Clientes</a>
            <div class="mt-auto pt-6 border-t border-white/10 text-xs text-slate-500 italic">Administrador: Evans</div>
        </nav>

        <main class="lg:col-span-9 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass p-5">
                    <p class="text-slate-400 text-sm">Estado del Sistema</p>
                    <div class="flex items-center gap-2 mt-2">
                        <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-yellow-500"></div>
                        <h3 id="connection-status" class="text-lg font-bold text-yellow-500">Sincronizando...</h3>
                    </div>
                </div>
                <div class="glass p-5 text-center">
                    <p class="text-slate-400 text-sm">Total Productos</p>
                    <h3 id="total-items" class="text-3xl font-bold text-white">0</h3>
                </div>
                <div class="glass p-5 text-center">
                    <p class="text-slate-400 text-sm">Última Actualización</p>
                    <h3 id="last-update" class="text-lg font-mono text-slate-300">--:--:--</h3>
                </div>
            </div>

            <section class="glass p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold uppercase tracking-tight">Control de Inventario Real</h2>
                    <button onclick="cargarDatos()" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-lg text-sm font-bold transition">
                        🔄 Refrescar
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-white/10 text-slate-400 text-xs uppercase">
                                <th class="pb-4 px-2">Producto</th>
                                <th class="pb-4 text-center">Categoría</th>
                                <th class="pb-4 text-center">Precio (RD$)</th>
                                <th class="pb-4 text-center">Stock</th>
                                <th class="pb-4 text-right px-2">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-body" class="text-sm">
                            <tr>
                                <td colspan="5" class="py-20 text-center text-slate-400 italic">
                                    Conectando con Compiuri Data Store...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        const MAKE_URL = "https://hook.us2.make.com/mi3g1y472l73g51refukafaej8uuspr4";

        async function cargarDatos() {
            const statusEl = document.getElementById('connection-status');
            const statusDot = document.getElementById('status-dot');
            const tableBody = document.getElementById('inventory-body');
            const totalItemsEl = document.getElementById('total-items');
            const lastUpdateEl = document.getElementById('last-update');

            try {
                const response = await fetch(MAKE_URL);
                const data = await response.json();

                // El código ahora es "inteligente": busca la lista en 'productos' o en la raíz
                const listado = data.productos || (Array.isArray(data) ? data : []);
                
                if (listado.length >= 0) {
                    statusEl.innerText = "Online";
                    statusEl.classList.replace('text-yellow-500', 'text-green-400');
                    statusDot.classList.replace('bg-yellow-500', 'bg-green-400');
                    statusDot.classList.add('pulse-green');
                    
                    totalItemsEl.innerText = listado.length;
                    lastUpdateEl.innerText = new Date().toLocaleTimeString();

                    tableBody.innerHTML = '';

                    // Ordenar alfabéticamente
                    listado.sort((a, b) => {
                        const nameA = (a.NOMBRE_PRODUCTO || a.value?.NOMBRE_PRODUCTO || "").toString().toUpperCase();
                        const nameB = (b.NOMBRE_PRODUCTO || b.value?.NOMBRE_PRODUCTO || "").toString().toUpperCase();
                        return (nameA < nameB) ? -1 : (nameA > nameB) ? 1 : 0;
                    });

                    listado.forEach(prod => {
                        // Extraer datos incluso si Make los envía "crudos" dentro de un objeto 'value'
                        const nombre = prod.NOMBRE_PRODUCTO || prod.value?.NOMBRE_PRODUCTO || "Sin nombre";
                        const precioVal = prod.PRECIO || prod.value?.PRECIO || 0;
                        const stockVal = prod.Stock_Disponible || prod.value?.Stock_Disponible || 0;
                        const categoria = prod.CATEGORIA || prod.value?.CATEGORIA || "General";

                        const precio = parseFloat(precioVal).toLocaleString('en-US', {minimumFractionDigits: 2});
                        const stock = parseInt(stockVal);

                        const stockClass = stock <= 5 ? 'text-red-400 bg-red-500/10 border-red-500/20' : 'text-green-400 bg-green-500/10 border-green-500/20';
                        
                        tableBody.innerHTML += `
                            <tr class="border-b border-white/5 hover:bg-white/5 transition group">
                                <td class="py-4 px-2 font-semibold text-slate-200 group-hover:text-blue-300 uppercase tracking-tighter">${nombre}</td>
                                <td class="py-4 text-center text-slate-400 text-xs uppercase">${categoria}</td>
                                <td class="py-4 text-center font-mono font-bold text-blue-300">RD$ ${precio}</td>
                                <td class="py-4 text-center">
                                    <span class="${stockClass} px-3 py-1 rounded-full text-xs font-bold border">${stock} uds</span>
                                </td>
                                <td class="py-4 text-right px-2">
                                    <button class="bg-white/5 hover:bg-white/10 p-2 rounded-lg transition">✏️</button>
                                </td>
                            </tr>
                        `;
                    });

                    if(listado.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="5" class="py-20 text-center text-slate-500 italic text-lg">El inventario está vacío.</td></tr>';
                    }
                }
            } catch (error) {
                console.error("Error cargando Compiuri:", error);
                statusEl.innerText = "Error Link";
                statusEl.classList.replace('text-yellow-500', 'text-red-500');
                tableBody.innerHTML = `<tr><td colspan="5" class="py-10 text-center text-red-400 font-bold">Error al conectar con Make. Revisa el escenario.</td></tr>`;
            }
        }

        // Auto-refrescar cada 30 segundos
        setInterval(cargarDatos, 30000);
        window.onload = cargarDatos;
    </script>
</body>
</html>
