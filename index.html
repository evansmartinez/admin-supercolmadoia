<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COMPIURI OS - Admin Business</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { color: #60a5fa; border-top: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .chart-container { position: relative; height: 260px; width: 100%; }
        #login-screen, #modal-registro { position: fixed; inset: 0; z-index: 100; background: rgba(15, 23, 42, 0.95); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
        input { transition: all 0.2s; }
        input:focus { border-color: #3b82f6 !important; outline: none; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .card-entry { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-20">

    <div id="login-screen">
        <div class="glass p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center space-y-6">
            <h2 class="text-3xl font-bold text-blue-400 italic">COMPIURI OS</h2>
            <div class="space-y-4 text-left">
                <input type="text" id="user" placeholder="Usuario" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-sm">
                <input type="password" id="pass" placeholder="Contraseña" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl text-sm">
                <p id="login-error" class="text-red-500 text-[10px] font-bold uppercase hidden">Credenciales Incorrectas</p>
                <button onclick="handleLogin()" class="w-full py-4 bg-blue-600 rounded-xl font-bold uppercase text-xs active:scale-95 transition-all">Acceder</button>
            </div>
        </div>
    </div>

    <div id="modal-registro" class="hidden">
        <div class="glass p-6 rounded-3xl w-full max-w-sm space-y-4 relative shadow-2xl border-t-2 border-blue-500">
            <button onclick="toggleModal()" class="absolute top-4 right-4 text-slate-400 text-xl">✕</button>
            <h3 class="text-xl font-bold text-blue-100 italic uppercase">Actualizar Stock</h3>
            <p class="text-[10px] text-slate-400 uppercase leading-tight">Si el producto existe, la cantidad ingresada se sumará al inventario actual.</p>
            <div class="space-y-3">
                <input type="text" id="reg-nombre" placeholder="NOMBRE DEL PRODUCTO" class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl text-sm uppercase">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="reg-precio" placeholder="PRECIO RD$" class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl text-sm">
                    <input type="number" id="reg-stock" placeholder="CANT. A SUMAR" class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl text-sm">
                </div>
                <input type="text" id="reg-cat" placeholder="CATEGORÍA" class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl text-sm uppercase">
                <button onclick="enviarAMake()" id="btn-enviar" class="w-full py-4 bg-green-600 rounded-xl font-bold uppercase text-xs shadow-lg mt-2 active:scale-95 transition-all">Guardar en Sistema</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="p-6 glass sticky top-0 z-50 flex justify-between items-center border-b border-white/5">
            <div>
                <h1 id="module-title" class="text-2xl font-bold tracking-tighter text-blue-400 italic uppercase">Inventario</h1>
                <p id="module-desc" class="text-[9px] text-slate-500 uppercase">Estado: Conectado</p>
            </div>
            <div class="flex gap-2">
                <button onclick="logout()" class="text-slate-500 text-[10px] font-bold uppercase px-3 py-2 border border-white/10 rounded-xl">Salir</button>
                <button onclick="toggleModal()" class="bg-blue-600 w-10 h-10 rounded-xl shadow-lg flex items-center justify-center text-xl font-bold active:scale-90 transition-all">+</button>
            </div>
        </header>

        <main class="p-4 space-y-6">
            <input type="text" id="main-search" oninput="filterData()" placeholder="Buscar en Compiuri..." class="w-full bg-slate-900/80 border border-white/10 p-4 rounded-2xl text-sm glass shadow-inner focus:border-blue-500">

            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-5 rounded-2xl border-l-4 border-blue-500">
                    <p id="kpi-label-1" class="text-[9px] uppercase text-slate-500 font-bold mb-1 italic">Calculando...</p>
                    <p id="kpi-val-1" class="text-2xl font-bold">--</p>
                </div>
                <div class="glass p-5 rounded-2xl border-l-4 border-red-500">
                    <p id="kpi-label-2" class="text-[9px] uppercase text-slate-500 font-bold mb-1 italic">Calculando...</p>
                    <p id="kpi-val-2" class="text-2xl font-bold">--</p>
                </div>
            </div>

            <div class="glass p-4 rounded-3xl"><div class="chart-container"><canvas id="mainChart"></canvas></div></div>
            
            <button onclick="refreshData()" class="w-full py-4 bg-slate-800 border border-white/5 rounded-2xl font-bold text-[10px] uppercase tracking-widest active:bg-slate-700 transition-all shadow-xl">
                🔄 Sincronizar Base de Datos
            </button>

            <div id="mobile-list" class="space-y-3 pb-10"></div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 h-16 glass border-t border-white/10 flex justify-around items-center z-50">
            <button onclick="switchModule('inventario')" id="btn-inventario" class="flex flex-col items-center justify-center w-full h-full tab-active">
                <span class="text-xl italic">📦</span><span class="text-[9px] font-bold uppercase mt-1">Stock</span>
            </button>
            <button onclick="switchModule('cierre')" id="btn-cierre" class="flex flex-col items-center justify-center w-full h-full text-slate-500">
                <span class="text-xl italic">📅</span><span class="text-[9px] font-bold uppercase mt-1">Cierre</span>
            </button>
        </nav>
    </div>

    <script>
        // CONFIGURACIÓN DE ENDPOINTS Y ACCESO
        const AUTH = { user: "evans", pass: "1234" };
        const ENDPOINTS = {
            inventario: "https://hook.us2.make.com/mi3g1y472l73g51refukafaej8uuspr4",
            cierre: "https://hook.us2.make.com/d5tivtytjjtyrxw1hhcp4vr5ijerc6b5",
            guardar: "TU_WEBHOOK_AQUI_EVANS" // <--- PEGA TU URL DE GUARDAR AQUÍ
        };

        let currentModule = 'inventario', rawData = [], myChart = null;
        const palette = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'];

        // LÓGICA DE SESIÓN
        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const err = document.getElementById('login-error');

            if (u === AUTH.user && p === AUTH.pass) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                refreshData();
            } else {
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        }

        function logout() { location.reload(); }
        function toggleModal() { document.getElementById('modal-registro').classList.toggle('hidden'); }

        // ENVÍO DE DATOS A MAKE CON LÓGICA DE SUMA
        async function enviarAMake() {
            const btn = document.getElementById('btn-enviar');
            const nomOriginal = document.getElementById('reg-nombre').value.trim().toUpperCase();
            const precioInput = parseFloat(document.getElementById('reg-precio').value);
            const cantInput = parseInt(document.getElementById('reg-stock').value) || 0;
            const catInput = document.getElementById('reg-cat').value.trim().toUpperCase();

            if(!nomOriginal || isNaN(precioInput)) return alert("El Nombre y Precio son requeridos");

            // Buscar si el producto ya existe para sumarle el stock
            const productoExistente = rawData.find(i => {
                const p = i.data || i.Record || i;
                const nombreEnLista = (p.NOMBRE_PRODUCTO || p.Nombre_Producto || p.Producto || p.nombre || "").toString().toUpperCase();
                return nombreEnLista === nomOriginal;
            });

            let stockFinal = cantInput;

            if (productoExistente) {
                const p = productoExistente.data || productoExistente.Record || productoExistente;
                const stockActual = parseInt(p.Stock_Disponible || p.stock || 0);
                stockFinal = stockActual + cantInput; 
            }

            const data = {
                nombre: nomOriginal,
                precio: precioInput,
                stock: stockFinal,
                categoria: catInput
            };

            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            try {
                const res = await fetch(ENDPOINTS.guardar, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if(res.ok) {
                    alert("Stock actualizado: " + nomOriginal + " ahora tiene " + stockFinal + " unidades.");
                    toggleModal();
                    refreshData(); // Recargar la lista
                }
            } catch (e) { alert("Error de comunicación con el servidor"); }
            finally { btn.innerText = "Guardar en Sistema"; btn.disabled = false; }
        }

        // FUNCIÓN DE BÚSQUEDA RESTAURADA
        function filterData() {
            const search = document.getElementById('main-search').value.toLowerCase();
            const filtered = rawData.filter(i => {
                const p = i.data || i.Record || i;
                const nom = (p.Nombre_Producto || p.NOMBRE_PRODUCTO || p.Producto || p.nombre || "").toString().toLowerCase();
                return nom.includes(search);
            });
            renderUI(filtered);
        }

        // OBTENER DATOS DESDE MAKE
        async function refreshData() {
            document.getElementById('module-desc').innerText = "Sincronizando...";
            try {
                const response = await fetch(ENDPOINTS[currentModule]);
                const json = await response.json();
                let list = json.productos || json.ventas || json.data || json;
                if (list.data) list = list.data;
                rawData = Array.isArray(list) ? list : [list];
                
                filterData(); // Usa el filtro por si hay algo escrito en el buscador
                document.getElementById('module-desc').innerText = "Actualizado: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            } catch (e) { 
                document.getElementById('module-desc').innerText = "Error de conexión"; 
            }
        }

        // RENDERIZAR INTERFAZ (STOCK Y CIERRE RESTAURADO COMPLETAMENTE)
        function renderUI(items) {
            const list = document.getElementById('mobile-list');
            list.innerHTML = "";
            let labels = [], values = [], totalVal = 0, alerts = 0;

            if (currentModule === 'inventario') {
                document.getElementById('kpi-label-1').innerText = "Total Productos";
                document.getElementById('kpi-label-2').innerText = "Stock Crítico";
                
                items.forEach(i => {
                    const p = i.data || i.Record || i;
                    const stock = parseInt(p.Stock_Disponible || p.stock || 0);
                    if (stock < 5) alerts++;
                    list.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex justify-between items-center card-entry mb-2">
                            <div>
                                <p class="font-bold text-sm uppercase">${p.NOMBRE_PRODUCTO || p.nombre || 'S/N'}</p>
                                <p class="text-blue-400 text-xs font-mono">RD$ ${parseFloat(p.PRECIO || p.precio || 0).toLocaleString()}</p>
                            </div>
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold border ${stock < 5 ? 'border-red-500 text-red-500 bg-red-500/10' : 'border-green-500 text-green-500 bg-green-500/10'}">${stock} UDS</span>
                        </div>`;
                });
                document.getElementById('kpi-val-1').innerText = items.length;
                document.getElementById('kpi-val-2').innerText = alerts;
                updateChart(items.slice(0,6).map(x => (x.data?.NOMBRE_PRODUCTO || x.nombre || 'Item').substring(0,6)), items.slice(0,6).map(x => x.data?.Stock_Disponible || x.stock || 0), 'bar');
            
            } else {
                // LÓGICA DE CIERRE DEL DÍA
                document.getElementById('kpi-label-1').innerText = "Caja Hoy";
                document.getElementById('kpi-label-2').innerText = "Órdenes Totales";
                let agrupar = {};
                
                items.forEach(i => {
                    const p = i.data || i.Record || i;
                    const nom = p.Nombre_Producto || p.Producto || "Venta N/A";
                    const monto = parseFloat(p.Monto_Total || p.monto || 0);
                    totalVal += monto;
                    agrupar[nom] = (agrupar[nom] || 0) + monto;
                    
                    list.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex justify-between items-center card-entry mb-2">
                            <div>
                                <p class="font-bold text-sm italic">${nom}</p>
                                <p class="text-slate-500 text-[10px] uppercase">${p.Cantidad || 1} Unidades</p>
                            </div>
                            <p class="text-green-400 font-bold font-mono">RD$ ${monto.toLocaleString()}</p>
                        </div>`;
                });
                
                document.getElementById('kpi-val-1').innerText = "RD$ " + Math.round(totalVal).toLocaleString();
                document.getElementById('kpi-val-2').innerText = items.length;
                updateChart(Object.keys(agrupar).slice(0,5), Object.values(agrupar).slice(0,5), 'pie');
            }
        }

        // GENERADOR DE GRÁFICOS
        function updateChart(labels, data, type) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: type,
                data: { 
                    labels: labels, 
                    datasets: [{ data: data, backgroundColor: palette.map(c => c + 'CC'), borderColor: '#0f172a', borderWidth: 2 }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: type === 'pie', position: 'bottom', labels: { color: '#94a3b8', font: {size: 8} } } },
                    scales: type === 'bar' ? { y: { beginAtZero: true, ticks: { color: '#94a3b8', font: {size: 8} } }, x: { ticks: { color: '#94a3b8', font: {size: 8} } } } : {}
                }
            });
        }

        // CAMBIO DE PESTAÑAS
        function switchModule(mod) {
            currentModule = mod;
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('tab-active', 'text-slate-500'));
            document.getElementById('btn-' + mod).classList.add('tab-active');
            document.getElementById('module-title').innerText = mod === 'inventario' ? 'Inventario' : 'Cierre Hoy';
            refreshData(); // Al cambiar, refrescamos los datos para pintar la pantalla correcta
        }
    </script>
</body>
</html>
