<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPIURI OS - Dashboard Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-item { transition: all 0.3s ease; border-left: 4px solid transparent; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.1); border-left-color: #3b82f6; color: #60a5fa; }
        .pulse-online { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="flex">

    <aside class="w-64 h-screen glass sticky top-0 flex flex-col p-6 z-50">
        <div class="mb-10 flex items-center gap-3">
            <img src="logoyofinalcorto.png" alt="Logo" class="w-10 h-10">
            <div>
                <h1 class="text-xl font-bold tracking-tighter text-blue-400">COMPIURI</h1>
                <p class="text-[10px] uppercase text-slate-500 tracking-widest">Admin Panel</p>
            </div>
        </div>

        <nav class="space-y-2 flex-grow">
            <button onclick="switchModule('inventario')" id="btn-inventario" class="sidebar-item active w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-xs font-bold tracking-widest">
                <span>📦</span> Inventario
            </button>
            <button onclick="switchModule('ventas')" id="btn-ventas" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-xs font-bold tracking-widest">
                <span>💰</span> Ventas
            </button>
            <button class="sidebar-item w-full flex items-center gap-3 p-3 rounded-r-lg opacity-30 cursor-not-allowed uppercase text-xs font-bold tracking-widest">
                <span>👥</span> Clientes
            </button>
        </nav>

        <div class="mt-auto pt-6 border-t border-white/10">
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500 pulse-online"></div>
                <span class="text-[10px] uppercase font-bold text-slate-400">Sistema Online</span>
            </div>
            <p class="text-[10px] text-slate-600 mt-1 italic">Operador: Evans</p>
        </div>
    </aside>

    <main class="flex-grow p-8">
        
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h2 id="module-title" class="text-4xl font-bold tracking-tighter italic">Inventario</h2>
                <p id="module-desc" class="text-slate-400 text-sm mt-1">Gestión de existencias en tiempo real para La Grada.</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase text-slate-500 mb-1 font-bold">Última Sincronización</p>
                <p id="last-sync" class="font-mono text-blue-300">--:--:--</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass p-6 rounded-2xl">
                <p id="kpi-label-1" class="text-[10px] uppercase text-slate-400 font-bold mb-1">Total Productos</p>
                <p id="kpi-val-1" class="text-3xl font-bold">0</p>
            </div>
            <div class="glass p-6 rounded-2xl border-b-2 border-blue-500">
                <p id="kpi-label-2" class="text-[10px] uppercase text-slate-400 font-bold mb-1">Stock Bajo</p>
                <p id="kpi-val-2" class="text-3xl font-bold text-yellow-500">0</p>
            </div>
            <div class="glass p-6 rounded-2xl flex items-center">
                <button onclick="refreshCurrentModule()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-xs transition-all uppercase tracking-widest">Refrescar Datos</button>
            </div>
        </div>

        <section class="glass rounded-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead id="table-head" class="bg-white/5 text-[10px] uppercase tracking-widest text-slate-500 font-bold">
                        </thead>
                    <tbody id="table-body" class="divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // CONFIGURACIÓN DE URLS - EVANS: Pon aquí tus Webhooks de Make
        const ENDPOINTS = {
            inventario: "https://hook.us2.make.com/mi3g1y472l73g51refukafaej8uuspr4",
            ventas: "TU_WEBHOOK_DE_VENTAS_AQUI" 
        };

        let currentModule = 'inventario';

        async function switchModule(mod) {
            currentModule = mod;
            // Actualizar UI de botones
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`btn-${mod}`).classList.add('active');
            
            // Actualizar Títulos
            const titles = {
                inventario: ["Inventario", "Gestión de existencias en tiempo real.", "Total Productos", "Stock Bajo"],
                ventas: ["Ventas", "Historial de ingresos y tickets.", "Venta Total", "Órdenes Hoy"]
            };
            
            document.getElementById('module-title').innerText = titles[mod][0];
            document.getElementById('module-desc').innerText = titles[mod][1];
            document.getElementById('kpi-label-1').innerText = titles[mod][2];
            document.getElementById('kpi-label-2').innerText = titles[mod][3];

            refreshCurrentModule();
        }

        async function refreshCurrentModule() {
            const tableHead = document.getElementById('table-head');
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '<tr><td colspan="4" class="p-20 text-center animate-pulse text-slate-500">Sincronizando con COMPIURI...</td></tr>';

            try {
                const response = await fetch(ENDPOINTS[currentModule]);
                const rawData = await response.json();
                
                // Extractor de datos flexible
                let list = rawData.productos || rawData.data || rawData;
                if (!Array.isArray(list)) list = list.data || [list];

                document.getElementById('last-sync').innerText = new Date().toLocaleTimeString();
                tableBody.innerHTML = "";

                if (currentModule === 'inventario') {
                    renderInventario(list);
                } else {
                    renderVentas(list);
                }

            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="4" class="p-20 text-center text-red-400 font-bold uppercase">Error de conexión con Make</td></tr>';
            }
        }

        function renderInventario(items) {
            document.getElementById('table-head').innerHTML = `
                <tr><th class="p-4 italic">Producto</th><th class="p-4 text-center">Categoría</th><th class="p-4 text-center">Precio</th><th class="p-4 text-center">Stock</th></tr>`;
            
            let stockBajo = 0;
            items.forEach(item => {
                const p = item.data || item.Record || item;
                const stock = parseInt(p.Stock_Disponible || 0);
                if (stock < 5) stockBajo++;

                document.getElementById('table-body').innerHTML += `
                    <tr class="hover:bg-white/5 transition-colors">
                        <td class="p-4 font-bold text-sm uppercase">${p.NOMBRE_PRODUCTO || '---'}</td>
                        <td class="p-4 text-center text-[10px] text-slate-500 font-bold uppercase tracking-widest">${p.CATEGORIA || 'Gral'}</td>
                        <td class="p-4 text-center font-mono text-blue-400">RD$ ${parseFloat(p.PRECIO || 0).toLocaleString()}</td>
                        <td class="p-4 text-center">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold border ${stock < 5 ? 'border-red-500 text-red-500 bg-red-500/10' : 'border-green-500 text-green-500 bg-green-500/10'} uppercase">
                                ${stock} UDS
                            </span>
                        </td>
                    </tr>`;
            });
            document.getElementById('kpi-val-1').innerText = items.length;
            document.getElementById('kpi-val-2').innerText = stockBajo;
            document.getElementById('kpi-val-2').className = stockBajo > 0 ? "text-3xl font-bold text-red-500" : "text-3xl font-bold text-green-500";
        }

        function renderVentas(items) {
            document.getElementById('table-head').innerHTML = `
                <tr><th class="p-4 italic">Cliente</th><th class="p-4 text-center">Detalle</th><th class="p-4 text-right">Total</th></tr>`;
            
            let totalDinero = 0;
            items.forEach(item => {
                const v = item.data || item.Record || item;
                const monto = parseFloat(v.Monto || v.Total || 0);
                totalDinero += monto;

                document.getElementById('table-body').innerHTML += `
                    <tr class="hover:bg-white/5 transition-colors">
                        <td class="p-4 font-bold text-sm uppercase">${v.Cliente || 'Cliente Final'}</td>
                        <td class="p-4 text-center text-xs text-slate-400 italic">${v.Detalle || 'Venta asistida'}</td>
                        <td class="p-4 text-right font-mono font-bold text-green-400">RD$ ${monto.toLocaleString()}</td>
                    </tr>`;
            });
            document.getElementById('kpi-val-1').innerText = "RD$ " + totalDinero.toLocaleString();
            document.getElementById('kpi-val-2').innerText = items.length;
            document.getElementById('kpi-val-2').className = "text-3xl font-bold text-white";
        }

        window.onload = () => refreshCurrentModule();
    </script>
</body>
</html>
