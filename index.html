<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPIURI OS - Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        .sidebar-item { transition: all 0.3s ease; border-left: 4px solid transparent; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.1); border-left-color: #3b82f6; color: #60a5fa; }
        .chart-container { position: relative; height: 320px; width: 100%; }
        .category-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .category-btn.active { background: #3b82f6; border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        /* Scrollbar estética para los botones */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex">

    <aside class="w-64 h-screen glass sticky top-0 flex flex-col p-6 z-50">
        <div class="mb-10 flex items-center gap-3">
            <img src="logoyofinalcorto.png" alt="Logo" class="w-10 h-10">
            <div>
                <h1 class="text-xl font-bold tracking-tighter text-blue-400">COMPIURI</h1>
                <p class="text-[10px] uppercase text-slate-500 tracking-widest text-center">Admin OS</p>
            </div>
        </div>
        <nav class="space-y-2 flex-grow">
            <button onclick="switchModule('inventario')" id="btn-inventario" class="sidebar-item active w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-xs font-bold tracking-widest text-left">
                <span>📦</span> Inventario
            </button>
            <button onclick="switchModule('ventas')" id="btn-ventas" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-xs font-bold tracking-widest text-left">
                <span>💰</span> Ventas
            </button>
        </nav>
        <div class="mt-auto pt-6 border-t border-white/10 text-[10px] text-slate-500 italic text-center">
            Evans Martínez
        </div>
    </aside>

    <main class="flex-grow p-8 max-w-[calc(100vw-256px)]">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h2 id="module-title" class="text-4xl font-bold tracking-tighter italic text-blue-100">Inventario</h2>
                <div class="flex items-center gap-2 mt-1">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-green-500"></span>
                    <p id="module-desc" class="text-slate-400 text-sm">Monitoreo de activos.</p>
                </div>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="main-search" oninput="filterData()" placeholder="Buscar producto..." 
                    class="w-full bg-slate-900/50 border border-white/10 p-3 rounded-xl text-sm glass focus:outline-none focus:border-blue-500 shadow-xl">
            </div>
        </header>

        <div id="category-bar" class="flex gap-2 mb-8 overflow-x-auto no-scrollbar pb-2">
            <button onclick="filterByCategory('TODOS')" class="category-btn active px-4 py-2 glass rounded-full text-[10px] font-bold uppercase tracking-widest whitespace-nowrap">Ver Todo</button>
            </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8 items-start">
            <div class="lg:col-span-4 space-y-4">
                <div class="glass p-6 h-32 flex flex-col justify-center border-l-4 border-blue-500 shadow-lg">
                    <p id="kpi-label-1" class="text-[10px] uppercase text-slate-500 font-bold mb-1 tracking-widest">Total en Vista</p>
                    <p id="kpi-val-1" class="text-3xl font-bold">0</p>
                </div>
                <div id="kpi-box-2" class="glass p-6 h-32 flex flex-col justify-center border-l-4 border-red-500 shadow-lg">
                    <p id="kpi-label-2" class="text-[10px] uppercase text-slate-500 font-bold mb-1 tracking-widest">Stock Crítico</p>
                    <p id="kpi-val-2" class="text-3xl font-bold text-red-500">0</p>
                </div>
                <button onclick="refreshCurrentModule()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-xl transition-all">🔄 Sincronizar</button>
            </div>

            <div class="lg:col-span-8 glass p-6 h-[360px] overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <p class="text-[10px] uppercase text-slate-500 font-bold tracking-widest" id="chart-title">Análisis de Existencias</p>
                    <span id="active-cat-label" class="text-[9px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded border border-blue-500/30 font-bold uppercase">TODOS</span>
                </div>
                <div class="chart-container">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>

        <section class="glass overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead id="table-head" class="bg-white/5 text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-white/10"></thead>
                    <tbody id="table-body" class="divide-y divide-white/5 text-sm">
                        <tr><td colspan="4" class="p-20 text-center animate-pulse text-slate-500">CARGANDO...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const ENDPOINTS = {
            inventario: "https://hook.us2.make.com/mi3g1y472l73g51refukafaej8uuspr4",
            ventas: "TU_WEBHOOK_VENTAS_AQUI" 
        };

        let currentModule = 'inventario';
        let allData = [];
        let myChart = null;
        let selectedCategory = 'TODOS';

        const palette = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];

        function initChart(labels, data, label, colors) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        backgroundColor: colors.map(c => c + 'B3'),
                        borderColor: colors,
                        borderWidth: 2,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { type: 'logarithmic', beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 9 }, maxRotation: 45 } }
                    }
                }
            });
        }

        async function refreshCurrentModule() {
            try {
                const response = await fetch(ENDPOINTS[currentModule]);
                const data = await response.json();
                allData = data.productos || (data.productos && data.productos.data) || (Array.isArray(data) ? data : (data.data || []));
                updateCategoryButtons();
                filterData();
            } catch (err) { console.error("Error Sync"); }
        }

        function updateCategoryButtons() {
            const container = document.getElementById('category-bar');
            const categories = [...new Set(allData.map(item => (item.data?.CATEGORIA || item.CATEGORIA || 'General')))];
            
            let html = `<button onclick="filterByCategory('TODOS')" class="category-btn ${selectedCategory === 'TODOS' ? 'active' : ''} px-4 py-2 glass rounded-full text-[10px] font-bold uppercase tracking-widest whitespace-nowrap">Ver Todo</button>`;
            
            categories.forEach(cat => {
                html += `<button onclick="filterByCategory('${cat}')" class="category-btn ${selectedCategory === cat ? 'active' : ''} px-4 py-2 glass rounded-full text-[10px] font-bold uppercase tracking-widest whitespace-nowrap">${cat}</button>`;
            });
            container.innerHTML = html;
        }

        function filterByCategory(cat) {
            selectedCategory = cat;
            document.getElementById('active-cat-label').innerText = cat;
            updateCategoryButtons();
            filterData();
        }

        function filterData() {
            const searchTerm = document.getElementById('main-search').value.toLowerCase();
            const filtered = allData.filter(item => {
                const p = item.data || item.Record || item;
                const catMatch = (selectedCategory === 'TODOS' || (p.CATEGORIA || 'General') === selectedCategory);
                const searchMatch = (p.NOMBRE_PRODUCTO || "").toLowerCase().includes(searchTerm);
                return catMatch && searchMatch;
            });
            renderDashboard(filtered);
        }

        function renderDashboard(items) {
            const tableBody = document.getElementById('table-body');
            const tableHead = document.getElementById('table-head');
            tableBody.innerHTML = "";
            let labels = [], chartData = [], colors = [];

            if (currentModule === 'inventario') {
                tableHead.innerHTML = `<tr><th class="p-4 uppercase">Producto</th><th class="p-4 text-center">Precio</th><th class="p-4 text-center">Stock</th></tr>`;
                
                const chartItems = [...items].sort((a,b) => (a.data?.Stock_Disponible || 0) - (b.data?.Stock_Disponible || 0)).slice(0, 10);
                
                chartItems.forEach((i, idx) => {
                    const p = i.data || i;
                    labels.push((p.NOMBRE_PRODUCTO || "").substring(0, 12));
                    chartData.push(Math.max(1, parseInt(p.Stock_Disponible || 0)));
                    colors.push(palette[idx % palette.length]);
                });

                let stockBajo = 0;
                items.forEach(item => {
                    const p = item.data || item.Record || item;
                    const stock = parseInt(p.Stock_Disponible || 0);
                    if (stock < 5) stockBajo++;
                    tableBody.innerHTML += `
                        <tr class="hover:bg-white/5 transition-colors border-b border-white/5">
                            <td class="p-4 font-bold uppercase text-slate-100">${p.NOMBRE_PRODUCTO}</td>
                            <td class="p-4 text-center font-mono text-blue-400">RD$ ${parseFloat(p.PRECIO || 0).toLocaleString()}</td>
                            <td class="p-4 text-center"><span class="px-3 py-1 rounded-full text-[10px] font-bold border ${stock < 5 ? 'border-red-500 text-red-500 bg-red-500/10' : 'border-green-500 text-green-500 bg-green-500/10'}">${stock} UDS</span></td>
                        </tr>`;
                });
                document.getElementById('kpi-val-1').innerText = items.length;
                document.getElementById('kpi-val-2').innerText = stockBajo;
                initChart(labels, chartData, 'Existencias', colors);
            }
        }
        window.onload = () => refreshCurrentModule();
    </script>
</body>
</html>
