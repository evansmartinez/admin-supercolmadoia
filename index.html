<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPIURI OS - Price Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        .sidebar-item { transition: all 0.3s ease; border-left: 4px solid transparent; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.1); border-left-color: #3b82f6; color: #60a5fa; }
        .chart-container { position: relative; height: 320px; width: 100%; }
        .category-btn.active { background: #3b82f6; border-color: #60a5fa; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="flex">

    <aside class="w-64 h-screen glass sticky top-0 flex flex-col p-6 z-50">
        <div class="mb-10 flex items-center gap-3">
            <img src="logoyofinalcorto.png" alt="Logo" class="w-10 h-10">
            <div>
                <h1 class="text-xl font-bold tracking-tighter text-blue-400">COMPIURI</h1>
                <p class="text-[10px] uppercase text-slate-500 tracking-widest text-center">Admin OS</p>
            </div>
        </div>
        <nav class="space-y-2 flex-grow">
            <button onclick="switchModule('inventario')" id="btn-inventario" class="sidebar-item active w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-xs font-bold tracking-widest text-left">
                <span>📦</span> Inventario
            </button>
            <button onclick="switchModule('ventas')" id="btn-ventas" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-xs font-bold tracking-widest text-left">
                <span>💰</span> Ventas
            </button>
            <button onclick="switchModule('precios')" id="btn-precios" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-r-lg hover:bg-white/5 uppercase text-xs font-bold tracking-widest text-left">
                <span>📈</span> Historial Precios
            </button>
        </nav>
        <div class="mt-auto pt-6 border-t border-white/10 text-[10px] text-slate-500 italic text-center">Evans Martínez</div>
    </aside>

    <main class="flex-grow p-8 max-w-[calc(100vw-256px)]">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h2 id="module-title" class="text-4xl font-bold tracking-tighter italic text-blue-100">Inventario</h2>
                <p id="module-desc" class="text-slate-400 text-sm">Análisis de activos en tiempo real.</p>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="main-search" oninput="filterData()" placeholder="Buscar..." class="w-full bg-slate-900/50 border border-white/10 p-3 rounded-xl text-sm glass focus:outline-none focus:border-blue-500">
            </div>
        </header>

        <div id="category-bar" class="flex gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-4 space-y-4">
                <div class="glass p-6 h-32 flex flex-col justify-center border-l-4 border-blue-500">
                    <p id="kpi-label-1" class="text-[10px] uppercase text-slate-500 font-bold mb-1">Total</p>
                    <p id="kpi-val-1" class="text-3xl font-bold">0</p>
                </div>
                <div id="kpi-box-2" class="glass p-6 h-32 flex flex-col justify-center border-l-4 border-yellow-500">
                    <p id="kpi-label-2" class="text-[10px] uppercase text-slate-500 font-bold mb-1">Métrica</p>
                    <p id="kpi-val-2" class="text-3xl font-bold">0</p>
                </div>
                <button onclick="refreshCurrentModule()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold text-xs uppercase shadow-xl transition-all active:scale-95">🔄 Actualizar Datos</button>
            </div>

            <div class="lg:col-span-8 glass p-6 h-[360px] overflow-hidden">
                <p class="text-[10px] uppercase text-slate-500 font-bold mb-4 tracking-widest" id="chart-title text-xs">Tendencia de Datos</p>
                <div class="chart-container">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>

        <section class="glass overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead id="table-head" class="bg-white/5 text-[10px] uppercase tracking-widest text-slate-500 font-bold border-b border-white/10"></thead>
                    <tbody id="table-body" class="divide-y divide-white/5 text-sm">
                        <tr><td colspan="4" class="p-20 text-center animate-pulse">CARGANDO...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const ENDPOINTS = {
            inventario: "https://hook.us2.make.com/mi3g1y472l73g51refukafaej8uuspr4",
            ventas: "TU_WEBHOOK_VENTAS_AQUI",
            precios: "https://hook.us2.make.com/mi3g1y472l73g51refukafaej8uuspr4" // Usando el mismo por ahora
        };

        let currentModule = 'inventario';
        let allData = [];
        let myChart = null;

        function initChart(labels, data, label, type = 'bar') {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        backgroundColor: type === 'line' ? 'rgba(59, 130, 246, 0.2)' : 'rgba(59, 130, 246, 0.7)',
                        borderColor: '#3b82f6',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4 // Suaviza la línea
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 9 } } }
                    }
                }
            });
        }

        async function switchModule(mod) {
            currentModule = mod;
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`btn-${mod}`).classList.add('active');
            
            const config = {
                inventario: ["Inventario", "Existencias", "Stock Crítico"],
                ventas: ["Ventas", "Total RD$", "Órdenes"],
                precios: ["Historial", "Promedio", "Cambios"]
            };
            
            document.getElementById('module-title').innerText = config[mod][0];
            document.getElementById('kpi-label-1').innerText = config[mod][1];
            document.getElementById('kpi-label-2').innerText = config[mod][2];
            
            refreshCurrentModule();
        }

        async function refreshCurrentModule() {
            try {
                const response = await fetch(ENDPOINTS[currentModule]);
                const data = await response.json();
                allData = data.productos || data.data || data;
                renderDashboard();
            } catch (e) { console.error("Sync Error"); }
        }

        function renderDashboard() {
            const tableBody = document.getElementById('table-body');
            const tableHead = document.getElementById('table-head');
            tableBody.innerHTML = "";
            
            let labels = [], chartData = [];

            if (currentModule === 'precios') {
                tableHead.innerHTML = `<tr><th class="p-4">Producto</th><th class="p-4 text-center">Precio Anterior</th><th class="p-4 text-center">Precio Actual</th><th class="p-4 text-center">Estado</th></tr>`;
                
                // Filtramos productos que tengan precio para graficar la tendencia
                const trendData = allData.slice(0, 10);
                labels = trendData.map(i => (i.data?.NOMBRE_PRODUCTO || i.NOMBRE_PRODUCTO || "").substring(0, 8));
                chartData = trendData.map(i => i.data?.PRECIO || i.PRECIO || 0);
                
                trendData.forEach(item => {
                    const p = item.data || item;
                    tableBody.innerHTML += `
                        <tr class="hover:bg-white/5 border-b border-white/5">
                            <td class="p-4 font-bold uppercase">${p.NOMBRE_PRODUCTO}</td>
                            <td class="p-4 text-center text-slate-500 font-mono">RD$ ${p.PRECIO_ANT || '---'}</td>
                            <td class="p-4 text-center font-mono text-blue-400 font-bold">RD$ ${p.PRECIO}</td>
                            <td class="p-4 text-center"><span class="text-[10px] font-bold text-green-400">ESTABLE</span></td>
                        </tr>`;
                });
                initChart(labels, chartData, 'Evolución de Precio', 'line');
            } else {
                // ... Aquí va el render de inventario anterior (mantenlo igual)
                switchModule('inventario'); // Default
            }
        }

        window.onload = () => switchModule('inventario');
    </script>
</body>
</html>
